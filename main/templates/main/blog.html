{% extends 'main/base.html' %}

{% block content %}

<section class="section">
    <div class="container">

        <!-- HEADER -->
        <div class="section__header">
            <h1 class="page-title">Blog</h1>
            <p class="section__desc">
                Articles about backend development, Python, and system design.
            </p>
        </div>

        <!-- POSTS GRID -->
        <div class="grid blog__grid">

            {% for post in posts %}
            <a href="{% url 'post_detail' post.id %}" class="card card--link">

                <!-- TITLE -->
                <h2 class="card__title">
                    {{ post.title }}
                </h2>

                <!-- DESCRIPTION -->
                <p class="card__desc">
                    {{ post.content|truncatewords:20 }}
                </p>

                <!-- FOOTER -->
                <div class="card__footer">

                    <span class="card__date">
                        {{ post.date }}
                    </span>

                    <span class="card__read">
                        Read →
                    </span>

                </div>

            </a>
            {% endfor %}

        </div>

    </div>
</section>

{% endblock %}
