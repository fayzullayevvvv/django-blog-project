{% extends 'main/base.html' %}

{% block content %}

<section class="article-section">
    <div class="container">

        {% if post %}

        <article class="article">

            <!-- HEADER -->
            <header class="article__header">

                <h1 class="article__title">
                    {{ post.title }}
                </h1>

                <div class="article__meta">
                    <span class="article__author">
                        Ozodbek Fayzullayev
                    </span>

                    <span class="article__dot"></span>

                    <time class="article__date">
                        {{ post.date }}
                    </time>
                </div>

            </header>

            <!-- CONTENT -->
            <div class="article__content">
                {{ post.content|linebreaks }}
            </div>

            <!-- FOOTER -->
            <footer class="article__footer">

                <a href="{% url 'blog' %}" class="back-link">
                    ← Back to blog
                </a>

            </footer>

        </article>

        {% else %}

        <!-- EMPTY STATE -->
        <div class="empty">

            <h1 class="empty__title">
                Post not found
            </h1>

            <p class="empty__desc">
                The article you're looking for doesn’t exist or was removed.
            </p>

            <a href="{% url 'blog' %}" class="btn btn--secondary">
                Go back to blog
            </a>

        </div>

        {% endif %}

    </div>
</section>

{% endblock %}
